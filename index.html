<style>
:root{
  --navy:#002349; --navy2:#0b3a6b; --gold:#C29B40; --ink:#2b2b2b; --grey:#67737a;
  --line:#e4e2dc; --bg:#f7f6f3; --card:#ffffff; --soft:#eef1f5;
  --good:#2e6b54; --goodbg:#e7f0ec; --warn:#8a6d1a; --warnbg:#f7eccf; --due:#8a4b12; --duebg:#f6e2d3;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Source Sans 3",Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:15px;line-height:1.45}
a{color:var(--navy2);text-decoration:none}
a:hover{text-decoration:underline}
.app{display:flex;min-height:100vh}
/* Sidebar */
.side{width:240px;background:var(--navy);color:#fff;flex:0 0 240px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand{padding:24px 22px 18px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .mark{font-family:"Cormorant Garamond",Garamond,Georgia,serif;font-size:21px;letter-spacing:.5px;line-height:1.15;font-weight:500}
.brand .sub{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:#aebfd2;margin-top:7px}
nav{padding:14px 0;flex:1}
nav a{display:flex;align-items:center;gap:11px;color:#d7e0ec;padding:11px 22px;font-size:14.5px;cursor:pointer;border-left:3px solid transparent}
nav a .ic{width:7px;height:7px;border-radius:50%;background:#5b769b}
nav a:hover{background:rgba(255,255,255,.05);text-decoration:none;color:#fff}
nav a.active{background:rgba(255,255,255,.08);color:#fff;border-left-color:var(--gold)}
nav a.active .ic{background:var(--gold)}
.side .foot{padding:16px 22px;border-top:1px solid rgba(255,255,255,.12);font-size:10.5px;color:#8ea0b8;line-height:1.5}
/* Main */
main{flex:1;min-width:0}
.top{background:var(--card);border-bottom:1px solid var(--line);padding:18px 34px;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:5}
.top h1{font-family:"Cormorant Garamond",Garamond,Georgia,serif;font-weight:500;font-size:27px;margin:0;color:var(--navy)}
.top .meta{font-size:12.5px;color:var(--grey);display:flex;align-items:center;gap:10px}
.top .meta b{color:var(--ink)}
.refresh{border:1px solid var(--line);background:#fff;color:var(--navy);padding:4px 12px;border-radius:20px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
.refresh:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.refresh.stale{border-color:var(--gold);color:var(--gold)}
.wrap{padding:26px 34px 60px;max-width:1180px}
.page{display:none}
.page.active{display:block}
h2.sec{font-family:"Cormorant Garamond",Garamond,Georgia,serif;font-weight:600;font-size:23px;color:var(--navy);margin:34px 0 4px;letter-spacing:.3px}
h2.sec:first-child{margin-top:4px}
.sec-note{color:var(--grey);font-size:13px;margin:0 0 14px}
.rule{height:1px;background:var(--line);margin:8px 0 18px}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:6px 0 8px}
.kpi{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--navy);border-radius:3px;padding:15px 16px}
.kpi .n{font-family:"Cormorant Garamond",Garamond,serif;font-size:34px;font-weight:600;color:var(--navy);line-height:1}
.kpi .l{font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);margin-top:6px}
.kpi.gold{border-top-color:var(--gold)} .kpi.gold .n{color:var(--gold)}
/* Cards & tables */
.card{background:var(--card);border:1px solid var(--line);border-radius:3px;margin:14px 0 22px;overflow:hidden}
.card .hd{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card .hd .t{font-weight:600;color:var(--navy);font-size:15px}
.card .hd .t .badge{display:inline-block;margin-left:8px;background:var(--soft);color:var(--navy);border-radius:20px;padding:1px 9px;font-size:12px;font-weight:600;vertical-align:middle}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-weight:600;color:var(--grey);font-size:11px;letter-spacing:.6px;text-transform:uppercase;padding:9px 18px;border-bottom:1px solid var(--line);background:#fbfaf8;position:sticky}
td{padding:10px 18px;border-bottom:1px solid #f0efe9;vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fcfbf8}
.name{font-weight:500;color:var(--ink);max-width:640px}
.muted{color:var(--grey)}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:3px;white-space:nowrap}
.tag.co{background:var(--soft);color:var(--navy)} .tag.ag{background:#f3eee2;color:var(--gold)}
.pp{display:inline-block;font-size:12.5px;font-weight:600;color:#fff;background:var(--navy);padding:3px 10px;border-radius:3px}
.pp:hover{background:var(--navy2);text-decoration:none}
.pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill.warn{background:var(--warnbg);color:var(--warn)} .pill.due{background:var(--duebg);color:var(--due)}
.pill.good{background:var(--goodbg);color:var(--good)}
.empty{padding:20px 18px;color:var(--grey);font-size:13.5px;background:repeating-linear-gradient(45deg,#fbfaf8,#fbfaf8 10px,#f6f4ee 10px,#f6f4ee 20px)}
.empty b{color:var(--ink)}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.cols2{grid-template-columns:1fr}.side{display:none}}
/* Campaign chips */
.campgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.campcard{background:var(--card);border:1px solid var(--line);border-radius:3px}
.campcard .ch{padding:11px 15px;border-bottom:1px solid var(--line);font-weight:600;color:var(--navy);display:flex;justify-content:space-between}
.campcard ul{margin:0;padding:8px 0;list-style:none}
.campcard li{padding:6px 15px;font-size:13px;border-bottom:1px solid #f4f2ec}
.campcard li:last-child{border:none}
.campcard li .d{color:var(--grey);font-size:11.5px}
/* Calendar */
.calleg{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--grey);margin:6px 0 14px}
.calleg span{display:inline-flex;align-items:center;gap:6px}
.calleg i{width:11px;height:11px;border-radius:2px;display:inline-block}
.month{margin:0 0 26px}
.month h3{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:20px;color:var(--navy);margin:0 0 8px}
.cal{width:100%;border-collapse:collapse;table-layout:fixed;background:var(--card);border:1px solid var(--line)}
.cal th{text-align:center;font-size:10.5px;padding:7px 0;background:var(--navy);color:#dbe5f0;border:none;position:static}
.cal td{border:1px solid var(--line);height:96px;padding:5px 6px;vertical-align:top;width:14.28%}
.cal td.we{background:#faf9f6}
.cal td.empty{background:#f4f2ec}
.cal td.hi{box-shadow:inset 0 3px 0 var(--gold)}
.cal .dn{display:inline-block;font-size:11.5px;color:var(--grey);font-weight:600;min-width:18px;text-align:center}
.cal td.today .dn{background:var(--navy);color:#fff;border-radius:50%;padding:1px 6px}
.evt{font-size:10.5px;line-height:1.25;margin-top:3px;padding:2px 5px;border-radius:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evt.np{background:var(--soft);color:var(--navy)}
.evt.npa{background:#f3eee2;color:#7a6320}
.evt.prod{background:var(--goodbg);color:var(--good)}
.evt.key{background:var(--duebg);color:var(--due);font-weight:600}
.more{font-size:10px;color:var(--grey);margin-top:2px}
/* Budget */
.bars{margin:6px 0}
.bar{display:grid;grid-template-columns:170px 1fr 92px;align-items:center;gap:12px;padding:7px 0}
.bar .bl{font-size:13px}
.bar .bt{background:var(--soft);border-radius:2px;height:18px;overflow:hidden}
.bar .bf{height:100%;background:linear-gradient(90deg,var(--navy),var(--navy2))}
.bar .bv{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;color:var(--navy)}
.spark{display:flex;align-items:flex-end;gap:6px;height:120px;padding:8px 4px;border-bottom:1px solid var(--line)}
.spark .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end;height:100%}
.spark .cb{width:60%;background:var(--gold);border-radius:2px 2px 0 0;min-height:2px}
.spark .cl{font-size:10px;color:var(--grey)}
.vsrow{display:grid;grid-template-columns:60px 1fr 1fr;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #f0efe9;font-size:13px}
.vsrow .m{position:relative;height:20px;background:var(--soft);border-radius:2px}
.vsrow .mb{position:absolute;left:0;top:0;height:100%;border-radius:2px}
.legend2{font-size:12px;color:var(--grey);display:flex;gap:16px;margin-top:8px}
.legend2 i{width:11px;height:11px;display:inline-block;border-radius:2px;margin-right:5px;vertical-align:-1px}
.subnav{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 4px}
.subnav button{border:1px solid var(--line);background:#fff;color:var(--grey);padding:6px 13px;border-radius:20px;font:inherit;font-size:12.5px;cursor:pointer}
.subnav button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.agentblock{margin:0 0 6px}
.agentblock summary{cursor:pointer;font-weight:600;color:var(--navy);padding:10px 16px;background:#fbfaf8;border:1px solid var(--line);border-radius:3px;margin-top:8px;list-style:none;display:flex;justify-content:space-between}
.agentblock summary::-webkit-details-marker{display:none}
.agentblock[open] summary{border-bottom-left-radius:0;border-bottom-right-radius:0}
.agentblock .inner{border:1px solid var(--line);border-top:none}
/* collapsible sections */
h2.sec.collap{cursor:pointer;user-select:none}
h2.sec.collap::before{content:'▾';display:inline-block;width:20px;color:var(--gold);font-size:16px;vertical-align:1px}
h2.sec.closed::before{content:'▸'}
/* budget grouped bars */
.spark2{display:flex;align-items:flex-end;gap:8px;height:150px;padding:10px 4px 4px;border-bottom:1px solid var(--line)}
.col2{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end;height:100%}
.stack{display:flex;align-items:flex-end;gap:3px;width:100%;height:100%;justify-content:center}
.cb{width:40%;border-radius:2px 2px 0 0;min-height:2px}
.cb.budget{background:var(--navy)} .cb.actual{background:var(--gold)}
.col2 .cl{font-size:10px;color:var(--grey)}
/* calendar expandable cells */
.cal td:not(.expanded) .evts .evt:nth-child(n+4){display:none}
.cal td.expanded{height:auto;vertical-align:top}
.cal .more{background:none;border:none;color:var(--grey);font-size:10px;cursor:pointer;padding:1px 0;margin-top:1px;display:block;font-family:inherit}
.cal .more:hover{color:var(--navy);text-decoration:underline}
/* calendar company/agent event colours + filters */
.evt.company{background:var(--soft);color:var(--navy)}
.evt.agent{background:#f3eee2;color:#7a6320}
.calfilter{display:flex;gap:8px;margin:2px 0 14px;flex-wrap:wrap}
.fbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--grey);padding:5px 13px;border-radius:20px;font:inherit;font-size:12.5px;cursor:pointer}
.fbtn.on{color:var(--navy);border-color:var(--navy);font-weight:600}
.fbtn .dot{width:10px;height:10px;border-radius:2px;display:inline-block;opacity:.3}
.fbtn.on .dot{opacity:1}
.dot.company{background:var(--navy)} .dot.agent{background:var(--gold)} .dot.key{background:var(--due)}
/* mark-complete */
th.chk,td.chk{width:30px;text-align:center;padding-left:10px;padding-right:0}
td.chk input{cursor:pointer;width:15px;height:15px;accent-color:var(--navy);vertical-align:middle}
tr.done td .name,tr.done td.name{color:var(--grey);text-decoration:line-through}
tr.done{background:#fbfbf9}
.cbar{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--grey);margin-left:6px;padding-left:12px;border-left:1px solid var(--line)}
.linkbtn{background:none;border:none;color:var(--navy2);font:inherit;font-size:12px;cursor:pointer;padding:0;text-decoration:underline}
.linkbtn:hover{color:var(--navy)}
</style>
</head>

  var days=Math.round((d-today)/86400000); var cls= days<0?'due':(days<=3?'due':(days<=7?'warn':'good'));
  var lab= days<0? Math.abs(days)+'d overdue' : (days===0?'today':days+'d');
  return fdate(s)+' <span class="pill '+cls+'">'+lab+'</span>'; }
function $(id){return document.getElementById(id);}
function attr(s){ return esc(s).replace(/"/g,'&quot;'); }
function fdaterange(d,e){ return (e && e!==d) ? (fdate(d)+' – '+fdate(e)) : fdate(d); }

/* ---------- mark-complete ----------
   Optional: set COMPLETE_ENDPOINT to a Google Apps Script web-app URL bound to
   the central sheet; ticking a box POSTs there and writes the Completed tab.
   With no endpoint, completions persist in this browser and can be copied into
   the sheet's Completed tab; the refresh routine reflects them. */
var COMPLETE_ENDPOINT = "";
var COMPLETED = new Map();
try{ (JSON.parse(localStorage.getItem('assir_completed')||'[]')).forEach(function(e){ COMPLETED.set(e.id, e.name); }); }catch(e){}
function rowId(r){ return r.permalink || r.id || r.name || ''; }
function saveCompleted(){
  localStorage.setItem('assir_completed', JSON.stringify([...COMPLETED].map(function(kv){return {id:kv[0],name:kv[1]};})));
  updateCbar();
}
function toggleComplete(id,name,el){
  if(COMPLETED.has(id)) COMPLETED.delete(id); else COMPLETED.set(id,name);
  var on=COMPLETED.has(id); var tr=el.closest('tr'); if(tr) tr.classList.toggle('done',on);
  saveCompleted();
  if(COMPLETE_ENDPOINT){ try{ fetch(COMPLETE_ENDPOINT,{method:'POST',mode:'no-cors',body:JSON.stringify({id:id,name:name,complete:on})}); }catch(e){} }
}
function updateCbar(){
  var el=$('cbar'); if(!el) return; var n=COMPLETED.size;
  el.innerHTML = n ? ('<b>'+n+'</b> marked complete <button class="linkbtn" id="copydone">copy for sheet</button><button class="linkbtn" id="cleardone">clear</button>') : '';
  if(n){
    $('copydone').onclick=function(){ var t=[...COMPLETED].map(function(kv){return kv[1]+'\t'+kv[0];}).join('\n');
      if(navigator.clipboard) navigator.clipboard.writeText(t); $('copydone').textContent='copied ✓'; setTimeout(updateCbar,1200); };
    $('cleardone').onclick=function(){ COMPLETED.clear(); saveCompleted(); document.querySelectorAll('tr.done').forEach(function(t){t.classList.remove('done');}); };
  }
}

function tbl(rows, opts){
  opts=opts||{};
  if(!rows||!rows.length) return '<div class="empty">No items currently.</div>';
  var cols=opts.cols, mk=opts.markable;
  var h='<table><thead><tr>'+(mk?'<th class="chk" title="Mark complete">✓</th>':'')+cols.map(function(c){return '<th>'+c.h+'</th>';}).join('')+'</tr></thead><tbody>';
  rows.forEach(function(r){
    var id=rowId(r), on=mk&&COMPLETED.has(id);
    h+='<tr'+(on?' class="done"':'')+'>'+
       (mk?('<td class="chk"><input type="checkbox" '+(on?'checked':'')+' data-id="'+attr(id)+'" data-name="'+attr(r.name||r.item||'')+'"></td>'):'')+
       cols.map(function(c){return '<td>'+c.f(r)+'</td>';}).join('')+'</tr>';
  });
  return h+'</tbody></table>';
}
var C_NAME={h:'Ad name',f:function(r){var t=r.corp?('<span class="tag '+(/Company/i.test(r.corp)?'co':'ag')+'">'+esc(r.corp)+'</span> '):''; return '<span class="name">'+(r.permalink?'<a target="_blank" href="'+esc(r.permalink)+'">':'')+esc(r.name)+(r.permalink?'</a>':'')+'</span> '+t;}};
var C_NAME_PLAIN={h:'Ad name',f:function(r){return '<span class="name">'+(r.permalink?'<a target="_blank" href="'+esc(r.permalink)+'">':'')+esc(r.name)+(r.permalink?'</a>':'')+'</span>';}};
var C_PUB ={h:'Publish date',f:function(r){return fdate(r.publishDate);}};
var C_PP  ={h:'PageProof',f:function(r){return pp(r.proofUrl);}};

function cardTbl(title,count,rows,cols,note,markable){

function fbtn(key,label){ return '<button class="fbtn '+(calFilters[key]?'on':'')+'" data-f="'+key+'"><i class="dot '+key+'"></i>'+label+'</button>'; }
function renderCalendar(){

function drawCalFilter(){
  var el=$('calfilter'); el.innerHTML=fbtn('company','Company')+fbtn('agent','Agent')+fbtn('key','Key dates');
  el.querySelectorAll('.fbtn').forEach(function(b){ b.addEventListener('click',function(){
    calFilters[b.dataset.f]=!calFilters[b.dataset.f]; drawCalFilter(); drawCalMonths(); }); });
}
function drawCalMonths(){
  var ev={};
  function add(date,cls,name){ if(!date||!calFilters[cls]) return; (ev[date]=ev[date]||[]).push({cls:cls,label:shortName(name),full:name}); }
  DATA.calendar_production.forEach(function(r){ add(r.date, r.side, r.name); });          // Company navy / agent gold
  DATA.newspaper.company.forEach(function(a){ add(a.runDate,'company', a.name); });
  DATA.newspaper.agents.forEach(function(g){ g.ads.forEach(function(a){ add(a.runDate,'agent', a.name); }); });
  DATA.key_dates.forEach(function(d){ add(d.date,'key', d.name); });
  var months=[[2026,5],[2026,6],[2026,7],[2026,8]], h='';
  months.forEach(function(m){ h+=monthGrid(m[0],m[1],ev); });
  $('calmonths').innerHTML=h;
  $('calmonths').querySelectorAll('.more').forEach(function(btn){
    btn.addEventListener('click',function(e){ e.stopPropagation();
      var td=btn.closest('td'); var open=td.classList.toggle('expanded');
      btn.textContent= open ? 'show less' : '+'+btn.getAttribute('data-n')+' more';
    });
  });
}
function shortName(n){ n=String(n); // trim long newspaper strings to something legible
  var m=n.split(' - '); if(n.length>42){ return n.slice(0,40)+'…'; } return n; }
function monthGrid(y,mo,ev){
  var first=new Date(y,mo,1), start=first.getDay(), days=new Date(y,mo+1,0).getDate();
  var today=DATA.generated;
  var h='<div class="month"><h3>'+["January","February","March","April","May","June","July","August","September","October","November","December"][mo]+' '+y+'</h3>';
  h+='<table class="cal"><thead><tr>'+["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(function(d){return '<th>'+d+'</th>';}).join('')+'</tr></thead><tbody><tr>';
  for(var i=0;i<start;i++) h+='<td class="empty"></td>';
  for(var d=1;d<=days;d++){
    var dow=(start+d-1)%7; if(dow===0 && d!==1) h+='</tr><tr>';
    var ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var items=ev[ds]||[]; var hasKey=items.some(function(e){return e.cls==='key';});
    var cls='cell'+((dow===0||dow===6)?' we':'')+(hasKey?' hi':'')+(ds===today?' today':'');
    h+='<td class="'+cls+'"><div class="dn">'+d+'</div><div class="evts">';
    items.forEach(function(e){ h+='<div class="evt '+e.cls+'" title="'+attr(e.full)+'">'+esc(e.label)+'</div>'; });
    h+='</div>';
    if(items.length>3) h+='<button class="more" data-n="'+(items.length-3)+'">+'+(items.length-3)+' more</button>';
    h+='</td>';
  }
  var last=(start+days-1)%7; for(var j=last+1;j<7;j++) h+='<td class="empty"></td>';
  return h+'</tr></tbody></table></div>';
}

/* ---------- collapsible sections ---------- */
// Wrap everything after each <h2.sec> (until the next one) in a body div the
// heading can show/hide. Content before the first heading (e.g. KPIs) stays put.
function makeCollapsible(el){
  var kids=[].slice.call(el.children), cur=null;
  kids.forEach(function(node){
    if(node.tagName==='H2' && node.classList.contains('sec')){
      node.classList.add('collap');
      var body=document.createElement('div'); body.className='collap-body';
      node.parentNode.insertBefore(body, node.nextSibling);
      node.addEventListener('click',function(){
        var closed=node.classList.toggle('closed');
        body.style.display=closed?'none':'';
      });
      cur=body;
    } else if(cur){ cur.appendChild(node); }
  });
}

var RENDER={summary:renderSummary,calendar:renderCalendar,social:renderSocial,programmatic:renderProgrammatic,budget:renderBudget,agents:renderAgents};
var TITLES={summary:'Summary',calendar:'Calendar',social:'Social Media',programmatic:'Programmatic',budget:'Budget',agents:'Agents'};
var done={};
function show(pg){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('#nav a').forEach(function(a){a.classList.toggle('active',a.dataset.pg===pg);});
  $('pg-'+pg).classList.add('active'); $('ptitle').textContent=TITLES[pg];
  if(!done[pg]){ RENDER[pg](); makeCollapsible($('pg-'+pg)); done[pg]=true; }
  window.scrollTo(0,0);
}
document.querySelectorAll('#nav a').forEach(function(a){ a.addEventListener('click',function(){show(a.dataset.pg);}); });

function boot(){
  $('gen').textContent=fdate(DATA.generated);
  // Refresh = re-fetch the published file, bypassing the cache (data is baked in,
  // so a plain re-render would change nothing).
  $('refresh').addEventListener('click',function(){
    location.replace(location.pathname+'?t='+ new Date().getTime());
  });
  // one delegated handler for every mark-complete checkbox (current + future renders)
  document.addEventListener('change',function(e){
    var cb=e.target;
    if(cb && cb.matches && cb.matches('input[type=checkbox][data-id]')){
      toggleComplete(cb.getAttribute('data-id'), cb.getAttribute('data-name'), cb);
    }
  });
  updateCbar();
  // Flag the button if the snapshot looks more than a day old.
  var gen=new Date(DATA.generated+'T00:00:00'), age=(new Date()-gen)/86400000;
  if(age>1.5){ $('refresh').classList.add('stale'); $('refresh').title='This snapshot is '+Math.floor(age)+' days old — fetch the latest'; }
  renderSummary(); makeCollapsible($('pg-summary')); done.summary=true;
}

/* Optional live mode: if SHEET_ID set, this is where a gviz loader would
   fetch each tab and replace DATA before boot(). Left as the documented
   upgrade path; embedded snapshot renders by default. */
boot();
</script>
</body>
</html>
